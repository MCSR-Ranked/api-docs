      summary: Get Season Best Time Leaderboard
      description: Returns the 100 fastest runs of a season
      operationId: getSeasonBestTimeLeaderboard
      tags:
        - leaderboards
      parameters:
        - name: season
          in: query
          required: false
          description: >-
            Filter by season. If it's 0, it will default to the current season. If it's not defined, it combines all
            seasons. (default: undefined)
          schema:
            type: integer
        - name: distinct
          in: query
          required: false
          description: Whether to only get distinct runners. If enabled, only the fastest run of each runner is returned.
          schema:
            type: string
          allowEmptyValue: true
      security: []
      responses:
        "200":
          description: Successful response
          content:
