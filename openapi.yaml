components:
  securitySchemes:
    PrivateKey:
      type: apiKey
      in: header
      name: Private-Key
      description: Generated in-game via Profile > Settings > Generate & Copy API Private Key.
  schemas:
    ErrorResponse:
      type: object
      properties:
        status:
          type: string
          example: error
        data:
          type: string
          nullable: true
    UserProfile:
      type: object
      description: UserProfile data
      properties:
        uuid:
          type: string
          description: User's UUID
        nickname:
          type: string
          description: User's nickname
        roleType:
          type: integer
          description: User's role type
        eloRate:
          type: integer
          nullable: true
          description: User's Elo rate. It is null if the user hasn't finished placement matches.
        eloRank:
          type: integer
          nullable: true
          description: User's Elo rank
        country:
          type: string
          nullable: true
          description: User's country code in lowercased ISO 3166-1 alpha-2 format.
      required:
        - uuid
        - nickname
        - roleType
    Achievement:
      type: object
      description: Achievement data
      properties:
        id:
          type: string
          description: Achievement Identifier
        date:
          $ref: "#/components/schemas/Date"
          description: Timestamp of when the achievement was earned
        data:
          type: array
          items:
            type: string
          description: Additional data array
        level:
          type: integer
          description: Level of achievement
        value:
          type: integer
          nullable: true
          description: >-
            Contains the current player's progression of the achievement. It is null if the achievement is not a
            leveling one.
        goal:
          type: integer
          nullable: true
          description: Next level goal of the achievement. It is null if the achievement is at max level or not a leveling one.
      required:
        - id
        - date
        - data
        - level
    MatchInfo:
      type: object
      description: MatchInfo data
      properties:
        id:
          type: string
        type:
          $ref: "#/components/schemas/MatchType"
        season:
          type: integer
        category:
          type: string
          nullable: true
          description: Match completions category. Default is ANY
        date:
          $ref: "#/components/schemas/Date"
        players:
          type: array
          items:
            $ref: "#/components/schemas/UserProfile"
        spectators:
          type: array
          items:
            $ref: "#/components/schemas/UserProfile"
        seed:
          allOf:
            - $ref: "#/components/schemas/MatchSeed"
          description: Seed ID if it's a ranked filtered seed. This is not the seed number. It is null if the seed is not filtered.
        forfeited:
          type: boolean
          description: Whether the match has no completions
        decayed:
          type: boolean
          description: Whether the match has decayed
        tag:
          type: string
          nullable: true
          description: Special tag of this match. Used to get matches by tag.
        beginner:
          type: boolean
          description: Whether beginner mode is enabled in the match.
        replayExist:
          type: boolean
          description: (Advanced) Whether the match replay exists in the server
        result:
          type: object
          properties:
            uuid:
              type: string
              nullable: true
              description: Winner's UUID. It is null if the match was a draw.
            time:
              $ref: "#/components/schemas/Time"
        rank:
          type: object
          properties:
            season:
              type: integer
              nullable: true
              description: Record rank of the match's season
            allTime:
              type: integer
              nullable: true
              description: Record rank of all-time
        changes:
          type: array
          items:
            type: object
            properties:
              uuid:
                type: string
                description: UUID of player
              change:
                type: integer
                nullable: true
                description: Amount of changed Elo rate. It is null if the match is a placement.
              eloRate:
                type: integer
                nullable: true
                description: Elo rate of the player. It is null if the match is a placement.
        vod:
          type: array
          items:
            type: object
            properties:
              uuid:
                type: string
                description: UUID of VOD owner. Only players with public stream activated will be included.
              url:
                type: string
                description: VOD URL of this match
              startsAt:
                $ref: "#/components/schemas/Date"
                description: VOD start date. You can get a timestamp with {date} - {vod[].startsAt}
        completions:
          type: array
          items:
            type: object
            properties:
              uuid:
                type: string
                description: (Advanced) Player uuid of completion
              time:
                $ref: "#/components/schemas/Time"
                description: (Advanced) Match time of completion
        timelines:
          type: array
          items:
            type: object
            properties:
              uuid:
                type: string
                description: (Advanced) Player uuid of timeline
              time:
                $ref: "#/components/schemas/Time"
                description: (Advanced) Match time of timeline
              type:
                type: string
                description: (Advanced) Identifier of timeline
      required:
        - id
        - type
        - season
        - date
        - players
        - spectators
        - forfeited
        - decayed
        - beginner
        - replayExist
    MatchSeed:
      type: object
      description: MatchSeed data
      properties:
        id:
          type: string
          nullable: true
          description: Seed id if it's a ranked filtered seed. This is not the seed number. It is null if the seed is not filtered.
        overworld:
          type: string
          nullable: true
          description: Overworld structure type of the seed. It is null if the seed is not filtered.
        nether:
          type: string
          nullable: true
          description: Bastion remnants type of the seed. It is null if the seed is not filtered.
        endTowers:
          type: array
          items:
            type: integer
          description: The zero related tower heights of in The End dimension. It is an empty array if the seed is not filtered.
        variations:
          type: array
          items:
            type: string
          description: Noticeable variations of the seed. It is an empty array if the seed is not filtered.
      required:
        - endTowers
        - variations
    UserIdentifier:
      type: string
      description: Identifier used when getting user information. You must use one of the formats below.
    MatchType:
      type: integer
      description: "Match type: 1 = Casual, 2 = Ranked, 3 = Private Room, 4 = Event Mode"
      enum:
        - 1
        - 2
        - 3
        - 4
    Date:
      type: integer
      description: Displays a specific date as an epoch time (timestamp) in seconds. (NOT milliseconds!)
    Time:
      type: integer
      description: Displays a specific duration in milliseconds.
    MatchInfoAdvanced:
      description: Match information with advanced fields (only from /matches/{match_id})
      allOf:
        - $ref: "#/components/schemas/MatchInfo"
        - type: object
          properties:
            completions:
              type: array
              items:
                type: object
                properties:
                  uuid:
                    type: string
                    description: (Advanced) Player uuid of completion
                  time:
                    $ref: "#/components/schemas/Time"
                    description: (Advanced) Match time of completion
            timelines:
              type: array
              items:
                type: object
                properties:
                  uuid:
                    type: string
                    description: (Advanced) Player uuid of timeline
                  time:
                    $ref: "#/components/schemas/Time"
                    description: (Advanced) Match time of timeline
                  type:
                    type: string
                    description: (Advanced) Identifier of timeline
            replayExist:
              type: boolean
              description: (Advanced) Whether the match replay exists in the server
